[versions]
agp = "8.13.2"
libxposedApi = "101.0.1"
dexkit = "2.1.0"
kotlin = "2.3.20"
kavaref-core = "1.0.2"
kavaref-extension = "1.0.2"

[libraries]
libxposed-api = { module = "io.github.libxposed:api", version.ref = "libxposedApi" }
dexkit = { module = "org.luckypray:dexkit", version.ref = "dexkit" }
kavaref-core = { module = "com.highcapable.kavaref:kavaref-core", version.ref = "kavaref-core" }
kavaref-extension = { module = "com.highcapable.kavaref:kavaref-extension", version.ref = "kavaref-extension" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }

