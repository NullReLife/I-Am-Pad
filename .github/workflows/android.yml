name: Android CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      signing_type:
        description: '签名方式'
        required: true
        type: choice
        options:
          - 'default'    # 使用默认签名构建 release
          - 'custom'     # 使用自己的签名密钥
        default: 'default'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 创建 debug.keystore 用于默认签名
      - name: Create debug keystore
        if: ${{ github.event.inputs.signing_type != 'custom' }}
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK with default signing
        if: ${{ github.event.inputs.signing_type != 'custom' }}
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android

      - name: Build Release APK (unsigned for custom signing)
        if: ${{ github.event.inputs.signing_type == 'custom' }}
        run: ./gradlew assembleRelease

      - name: Sign Release APK with custom key
        if: ${{ github.event.inputs.signing_type == 'custom' }}
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release APK (default signing)
        if: ${{ github.event.inputs.signing_type != 'custom' }}
        uses: actions/upload-artifact@v4
        with:
          name: i.am.pad-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release APK (custom signed)
        if: ${{ github.event.inputs.signing_type == 'custom' }}
        uses: actions/upload-artifact@v4
        with:
          name: i.am.pad-release-signed
          path: app/build/outputs/apk/release/*signed.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: i.am.pad-debug
          path: app/build/outputs/apk/debug/*.apk
