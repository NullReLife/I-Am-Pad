name: Android CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      signing_type:
        description: '签名方式'
        required: true
        type: choice
        options:
          - 'default'    # 使用默认/debug签名
          - 'custom'     # 使用自己的签名密钥
        default: 'default'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK (with default signing)
        if: ${{ github.event.inputs.signing_type != 'custom' }}
        run: ./gradlew assembleRelease

      - name: Build Release APK (unsigned for custom signing)
        if: ${{ github.event.inputs.signing_type == 'custom' }}
        run: ./gradlew assembleRelease

      - name: Sign Release APK with custom key
        if: ${{ github.event.inputs.signing_type == 'custom' }}
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release APK (default signing)
        if: ${{ github.event.inputs.signing_type != 'custom' }}
        uses: actions/upload-artifact@v4
        with:
          name: i.am.pad-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release APK (custom signed)
        if: ${{ github.event.inputs.signing_type == 'custom' }}
        uses: actions/upload-artifact@v4
        with:
          name: i.am.pad-release-signed
          path: app/build/outputs/apk/release/*signed.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: i.am.pad-debug
          path: app/build/outputs/apk/debug/*.apk
